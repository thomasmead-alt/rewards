name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Build & test RewardsKit
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
        working-directory: RewardsKit
      - name: Test
        run: swift test
        working-directory: RewardsKit
