# XcodeGen spec — run `xcodegen generate` in the repo root to produce
# SproutRewards.xcodeproj (the project file itself is gitignored).
name: SproutRewards

options:
  bundleIdPrefix: com.sproutrewards
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  RewardsKit:
    path: RewardsKit

targets:
  SproutRewards:
    type: application
    platform: iOS
    sources:
      - App/Sources
    dependencies:
      - package: RewardsKit
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Sprout Rewards"
